<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{template "title" .}} - brun</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/">brun</a>
      <span class="nav-version">v0.1.0</span>
    </div>
    <div class="nav-links">
      <a href="/" {{if eq .CurrentPage "index"}}class="active"{{end}}>Dashboard</a>
      <span id="nav-run-link" style="display:none"><a href="#" id="nav-run-href">Run Detail</a></span>
    </div>
  </nav>

  <main class="container">
    {{template "content" .}}
  </main>

  <footer class="footer">
    <p>brun &mdash; bio-runner &copy; 2026</p>
  </footer>

  <!-- Toast 通知容器 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/static/app.js"></script>
  {{block "extra-js" .}}{{end}}
</body>
</html>
