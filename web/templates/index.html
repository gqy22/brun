<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - brun</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/">brun</a>
    </div>
    <div class="nav-links">
      <a href="/" class="active">Dashboard</a>
    </div>
  </nav>

  <main class="container dashboard-page">
    <!-- 过滤栏 -->
    <div class="filter-bar">
      <select id="filter-project" title="项目过滤">
        <option value="">所有项目</option>
      </select>
      <select id="filter-status" title="状态过滤">
        <option value="">所有状态</option>
        <option value="running">运行中</option>
        <option value="success">成功</option>
        <option value="failed">失败</option>
      </select>
      <select id="filter-tag" title="标签过滤">
        <option value="">所有标签</option>
      </select>
      <input type="text" id="filter-search" placeholder="搜索命令..." class="filter-input">
      <button onclick="doRefresh()" class="btn btn-sm btn-outline" id="btn-refresh">
        <svg class="btn-refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        刷新
      </button>
    </div>

    <!-- 桌面端：表格 -->
    <div class="table-wrap" id="table-wrap">
      <table class="table" id="runs-table">
        <thead>
          <tr>
            <th>Run ID</th>
            <th>Name</th>
            <th>Project</th>
            <th>Status</th>
            <th>Duration</th>
            <th>Command</th>
            <th>Started</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="runs-tbody">
          <tr><td colspan="8" class="text-center text-muted">加载中...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 移动端：卡片列表 -->
    <div class="run-card-list" id="run-card-list"></div>
  </main>

  <footer class="footer" id="footer-stats">
    <p>brun &mdash; bio-runner &copy; 2026</p>
  </footer>

  <script src="/static/app.js"></script>
  <script>
    let autoRefreshTimer = null;
    // 缓存上一次的 runs 数据，用于增量更新
    let _prevRuns = [];
    // running 任务的 {id: startedAt} 映射，用于本地计时
    let _runningTimers = {};

    document.addEventListener('DOMContentLoaded', () => {
      loadFilters();
      loadRuns();
      loadFooterStats();
    });

    async function loadFilters() {
      const [projects, tags] = await Promise.all([
        fetch('/api/projects').then(r => r.json()),
        fetch('/api/tags').then(r => r.json()),
      ]);
      const projSel = document.getElementById('filter-project');
      projects.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; projSel.appendChild(o); });
      const tagSel = document.getElementById('filter-tag');
      tags.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tagSel.appendChild(o); });
      ['filter-project','filter-status','filter-tag','filter-search'].forEach(id => {
        document.getElementById(id).addEventListener('change', loadRuns);
        document.getElementById(id).addEventListener('input', debounce(loadRuns, 300));
      });
    }

    function doRefresh() {
      var btn = document.getElementById('btn-refresh');
      var icon = btn.querySelector('.btn-refresh-icon');
      if (icon) icon.classList.add('btn-spinning');
      loadRuns().then(function() {
        if (icon) setTimeout(function() { icon.classList.remove('btn-spinning'); }, 400);
      });
    }

    async function loadRuns() {
      try {
        const params = new URLSearchParams();
        const fp = document.getElementById('filter-project').value;
        const fs = document.getElementById('filter-status').value;
        const ft = document.getElementById('filter-tag').value;
        const fq = document.getElementById('filter-search').value;
        if (fp) params.set('project', fp);
        if (fs) params.set('status', fs);
        if (ft) params.set('tag', ft);
        if (fq) params.set('search', fq);

        const resp = await fetch('/api/runs?' + params.toString());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const runs = await resp.json();

        // 增量更新表格（只修改变化的行）
        incrementTableUpdate(runs);

        // 增量更新卡片列表
        incrementCardUpdate(runs);

        // 管理 running 任务的本地计时器
        manageRunningTimers(runs);

        _prevRuns = runs;
      } catch (err) {
        console.error('loadRuns error:', err);
        document.getElementById('runs-tbody').innerHTML =
          '<tr><td colspan="8" class="text-center text-danger">加载失败: ' + esc(err.message) + '</td></tr>';
      }
    }

    // ===== 增量表格更新 =====

    function incrementTableUpdate(runs) {
      var tbody = document.getElementById('runs-tbody');
      var cardList = document.getElementById('run-card-list');

      if (!Array.isArray(runs) || runs.length === 0) {
        if (tbody.innerHTML !== '') {
          tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div><div class="empty-title">暂无运行记录</div><div class="empty-desc">运行你的第一个任务，这里会显示执行结果</div></div></td></tr>';
          cardList.innerHTML = '';
        }
        stopAllRunningTimers();
        return;
      }

      // 首次加载数据时清除 "加载中..." 占位行
      if (_prevRuns.length === 0 && tbody.querySelector('td.text-muted')) {
        tbody.innerHTML = '';
      }

      // 用 ID 做 index 快速查找
      var prevMap = {};
      _prevRuns.forEach(function(r) { prevMap[r.id] = r; });

      var curMap = {};
      runs.forEach(function(r) { curMap[r.id] = r; });

      // 1. 更新已存在的行 / 2. 新增行 / 3. 删除消失的行
      var htmlParts = [];
      runs.forEach(function(r, i) {
        var prev = prevMap[r.id];
        var dur = prev && prev.status === 'running' ? getLocalDuration(r.id) : (r.duration || '-');

        if (prev) {
          // 已存在行 — 只更新变化的单元格
          htmlParts.push(updateRowHtml(tbody.rows[i + 1], r, prev, dur));
        } else {
          // 新行
          htmlParts.push({ action: 'add', html: buildRowHtml(r, i, dur) });
        }
      });

      // 删除不再存在的行（倒序避免索引偏移）
      _prevRuns.forEach(function(prev) {
        if (!curMap[prev.id]) {
          htmlParts.push({ action: 'del', id: prev.id });
        }
      });

      // 执行 DOM 操作
      htmlParts.forEach(function(op) {
        if (op.action === 'add') {
          var tr = document.createElement('tr');
          tr.className = 'row-clickable animate-in';
          tr.style.animationDelay = (htmlParts.indexOf(op) * 35) + 'ms';
          tr.setAttribute('data-run-id', op.html.id);
          tr.innerHTML = op.html.cells;
          tr.onclick = function() { location.href = '/run/' + this.getAttribute('data-run-id'); };
          tbody.appendChild(tr);
        } else if (op.action === 'del') {
          var row = tbody.querySelector('[data-run-id="' + op.id + '"]');
          if (row) row.remove();
        } else {
          // 更新操作：op 本身就是更新后的 innerHTML 字符串
          var row = tbody.querySelector('[data-run-id="' + op.html.id + '"]');
          if (row) row.innerHTML = op.html;
        }
      });
    }

    function buildRowHtml(r, idx, dur) {
      return {
        id: r.id,
        cells: '<td><code class="run-id">' + esc(r.id) + '</code></td>' +
          '<td>' + (esc(r.name) || '<span class=text-muted>-</span>') + '</td>' +
          '<td>' + (esc(r.project) || '<span class=text-muted>-</span>') + '</td>' +
          '<td><span class="badge badge-' + r.status + '">' + r.status + '</span></td>' +
          '<td class="duration-cell">' + dur + '</td>' +
          '<td class="cmd-cell" title="' + esc(r.command) + '">' + esc(truncate(r.command, 60)) + '</td>' +
          '<td class="text-muted" style="font-size:13px">' + fmtTime(r.started_at) + '</td>' +
          '<td onclick="event.stopPropagation()" style="white-space:nowrap"><button class="btn btn-sm btn-delete-row" onclick="deleteRun(\'' + r.id + '\',event)" title="删除此记录">删除</button></td>'
      };
    }

    function updateRowHtml(row, r, prev, dur) {
      var changed = false;
      var html = '';

      // Name
      var nameCell = row.cells[1];
      var newName = esc(r.name) || '<span class=text-muted>-</span>';
      if (nameCell.innerHTML !== newName) { nameCell.innerHTML = newName; changed = true; }

      // Status badge
      var statusCell = row.cells[3];
      var newStatus = '<span class="badge badge-' + r.status + '">' + r.status + '</span>';
      if (statusCell.innerHTML !== newStatus) { statusCell.innerHTML = newStatus; changed = true; }

      // Duration（running 时用本地计时值）
      var durCell = row.cells[4];
      if (durCell.textContent !== dur) { durCell.textContent = dur; durCell.className = 'duration-cell'; changed = true; }

      // Command
      var cmdCell = row.cells[5];
      var newCmd = esc(truncate(r.command, 60));
      if (cmdCell.textContent !== truncate(r.command, 60)) { cmdCell.title = esc(r.command); cmdCell.innerHTML = newCmd; changed = true; }

      return { id: r.id, html: row.innerHTML, changed: changed };
    }

    // ===== 增量卡片更新 =====

    function incrementCardUpdate(runs) {
      var cardList = document.getElementById('run-card-list');
      if (!Array.isArray(runs) || runs.length === 0) {
        cardList.innerHTML = '';
        return;
      }

      var prevMap = {};
      _prevRuns.forEach(function(r) { prevMap[r.id] = r; });

      var curMap = {};
      runs.forEach(function(r) { curMap[r.id] = r; });

      runs.forEach(function(r) {
        var prev = prevMap[r.id];
        var dur = prev && prev.status === 'running' ? getLocalDuration(r.id) : (r.duration || '-');
        var card = cardList.querySelector('[data-card-id="' + r.id + '"]');

        if (card) {
          // 更新已有卡片
          var badge = card.querySelector('.badge');
          if (badge) { badge.className = 'badge badge-' + r.status; badge.textContent = r.status; }
          var durEl = card.querySelector('.run-card-duration-value');
          if (durEl) durEl.textContent = dur;
        } else {
          // 新增卡片
          card = document.createElement('div');
          card.className = 'run-card animate-in';
          card.setAttribute('data-card-id', r.id);
          card.onclick = function() { location.href = '/run/' + this.getAttribute('data-card-id'); };
          card.innerHTML =
            '<div class="run-card-header">' +
              '<span class="run-card-id">' + esc(r.id) + '</span>' +
              '<span class="badge badge-' + r.status + '">' + r.status + '</span>' +
            '</div>' +
            '<div class="run-card-body">' +
              (r.name ? '<div class="run-card-row"><span class="label">Name</span><span class="value">' + esc(r.name) + '</span></div>' : '') +
              '<div class="run-card-row"><span class="label">Project</span><span class="value">' + (esc(r.project) || '-') + '</span></div>' +
              '<div class="run-card-row"><span class="label">Duration</span><span class="run-card-duration-value">' + dur + '</span></div>' +
              '<div class="run-card-cmd" title="' + esc(r.command) + '">' + esc(truncate(r.command, 60)) + '</div>' +
            '</div>' +
            '<div class="run-card-footer">' +
              '<span class="run-card-time">' + fmtTime(r.started_at) + '</span>' +
              '<button class="btn btn-sm btn-delete-row" onclick="deleteRun(\'' + r.id + '\',event)" title="删除">删除</button>' +
            '</div>';
          cardList.appendChild(card);
        }
      });

      // 移除消失的卡片
      _prevRuns.forEach(function(prev) {
        if (!curMap[prev.id]) {
          var card = cardList.querySelector('[data-card-id="' + prev.id + '"]');
          if (card) card.remove();
        }
      });
    }

    // ===== Running 任务本地计时器 =====

    function manageRunningTimers(runs) {
      var seen = {};
      runs.forEach(function(r) {
        if (r.status === 'running' && r.started_at) seen[r.id] = r.started_at;
      });

      // 启动新的计时器
      Object.keys(seen).forEach(function(id) {
        if (!_runningTimers[id]) {
          _runningTimers[id] = seen[id];
        }
      });

      // 清理已结束的计时器
      Object.keys(_runningTimers).forEach(function(id) {
        if (!seen[id]) {
          delete _runningTimers[id];
        }
      });

      // 首次有 running 任务时启动全局刷新
      var hasRunning = Object.keys(_runningTimers).length > 0;
      if (hasRunning && !autoRefreshTimer) {
        autoRefreshTimer = setInterval(loadRuns, 10000);
      } else if (!hasRunning && autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    function stopAllRunningTimers() {
      Object.keys(_runningTimers).forEach(function(id) { delete _runningTimers[id]; });
      if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
    }

    function getLocalDuration(runId) {
      var started = _runningTimers[runId];
      if (!started) return '-';
      var ms = Date.now() - new Date(started).getTime();
      return formatDuration(ms);
    }

    function formatDuration(ms) {
      if (ms < 1000) return ms + 'ms';
      var s = Math.floor(ms / 1000);
      if (s < 60) return s + 's';
      var m = Math.floor(s / 60);
      var sec = s % 60;
      if (m < 60) return m + 'm ' + sec + 's';
      var h = Math.floor(m / 60);
      var min = m % 60;
      return h + 'h ' + min + 'm';
    }

    // ===== Footer Stats =====

    async function loadFooterStats() {
      try {
        const runs = await fetch('/api/runs').then(r => r.json());
        if (!Array.isArray(runs)) return;
        var total = runs.length;
        var success = runs.filter(r => r.status === 'success').length;
        var rate = total > 0 ? Math.round(success / total * 100) : 0;
        var today = new Date().toISOString().slice(0,10);
        var todayCount = runs.filter(r => r.started_at && r.started_at.startsWith(today)).length;

        document.getElementById('footer-stats').innerHTML =
          '<div class="footer-stats">' +
            '<div class="footer-stat"><div class="footer-stat-value">' + total + '</div><div class="footer-stat-label">总运行</div></div>' +
            '<div class="footer-stat"><div class="footer-stat-value">' + rate + '%</div><div class="footer-stat-label">成功率</div></div>' +
            '<div class="footer-stat"><div class="footer-stat-value">' + todayCount + '</div><div class="footer-stat-label">今日运行</div></div>' +
            '</div>';
      } catch(e) { /* 静默失败 */ }
    }

    async function deleteRun(id, e) {
      modalConfirm('确认删除', '将同时删除日志和输出文件，不可恢复。', async () => {
        const r = await fetch('/api/runs/' + id, { method: 'DELETE' });
        const d = await r.json();
        if (d.ok) { toast('success', '已删除'); loadRuns(); loadFooterStats(); }
        else toast('error', d.error || '删除失败');
      });
    }

    function truncate(s, maxLen) {
      if (!s || s.length <= maxLen) return s || '';
      return s.substring(0, maxLen) + '...';
    }

    function debounce(fn, ms) { var t; return function() { var a = arguments; clearTimeout(t); t = setTimeout(function() { fn.apply(this, a); }, ms); }; }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function fmtTime(s) { if (!s) return '-'; try { return new Date(s).toLocaleString('zh-CN'); } catch(e) { return s; } }
  </script>
</body>
</html>
