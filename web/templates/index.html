<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - brun</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><a href="/">brun</a></div>
    <div class="nav-links"><a href="/" class="active">Dashboard</a></div>
  </nav>

  <main class="container dashboard-page" x-data="dashboard()" x-init="init()">
    <!-- 过滤栏 -->
    <div class="filter-bar">
      <select x-model="filters.project" @change="loadRuns()">
        <option value="">所有项目</option>
        <template x-for="p in projects"><option :value="p" x-text="p"></option></template>
      </select>
      <select x-model="filters.status" @change="loadRuns()">
        <option value="">所有状态</option>
        <option value="running">运行中</option>
        <option value="success">成功</option>
        <option value="failed">失败</option>
      </select>
      <select x-model="filters.tag" @change="loadRuns()">
        <option value="">所有标签</option>
        <template x-for="t in tags"><option :value="t" x-text="t"></option></template>
      </select>
      <input type="text" x-model="filters.search" @input.debounce.300ms="loadRuns()"
             placeholder="搜索命令..." class="filter-input">
      <button @click="doRefresh()" class="btn btn-sm btn-outline"
              :class="{'btn-spinning': refreshing}">
        <svg class="btn-refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        刷新
      </button>
    </div>

    <!-- 桌面端：表格 -->
    <div class="table-wrap">
      <table class="table">
        <thead><tr><th>Run ID</th><th>Name</th><th>Project</th><th>Status</th><th>Duration</th><th>Command</th><th>Started</th><th></th></tr></thead>
        <tbody>
          <!-- 加载中 / 空状态 -->
          <template x-if="loading">
            <tr><td colspan="8" class="text-center text-muted">加载中...</td></tr>
          </template>
          <template x-if="!loading && runs.length === 0">
            <tr><td colspan="8"><div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div><div class="empty-title">暂无运行记录</div><div class="empty-desc">运行你的第一个任务，这里会显示执行结果</div></div></td></tr>
          </template>
          <!-- 数据行 -->
          <template x-for="(r, i) in runs" :key="r.id">
            <tr class="row-clickable animate-in" :style="'animation-delay:' + (i * 35) + 'ms'"
                @click="location.href='/run/'+r.id">
              <td><code class="run-id" x-text="r.id"></code></td>
              <td><span x-text="r.name || '-'"></span></td>
              <td><span x-text="r.project || '-'"></span></td>
              <td><span :class="'badge badge-'+r.status" x-text="r.status"></span></td>
              <td class="duration-cell" x-text="getDuration(r)"></td>
              <td class="cmd-cell" :title="r.command" x-text="truncate(r.command, 60)"></td>
              <td class="text-muted" style="font-size:13px" x-text="fmtTime(r.started_at)"></td>
              <td @click.stop style="white-space:nowrap">
                <button class="btn btn-sm btn-delete-row" @click="deleteRun(r.id, $event)" title="删除此记录">删除</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- 移动端：卡片列表 -->
    <div class="run-card-list">
      <template x-for="r in runs" :key="r.id">
        <div class="run-card animate-in" @click="location.href='/run/'+r.id">
          <div class="run-card-header">
            <span class="run-card-id" x-text="r.id"></span>
            <span :class="'badge badge-'+r.status" x-text="r.status"></span>
          </div>
          <div class="run-card-body">
            <template x-if="r.name">
              <div class="run-card-row"><span class="label">Name</span><span class="value" x-text="r.name"></span></div>
            </template>
            <div class="run-card-row"><span class="label">Project</span><span class="value" x-text="r.project || '-'"></span></div>
            <div class="run-card-row"><span class="label">Duration</span><span x-text="getDuration(r)"></span></div>
            <div class="run-card-cmd" :title="r.command" x-text="truncate(r.command, 60)"></div>
          </div>
          <div class="run-card-footer">
            <span class="run-card-time" x-text="fmtTime(r.started_at)"></span>
            <button class="btn btn-sm btn-delete-row" @click="deleteRun(r.id, $event)" title="删除">删除</button>
          </div>
        </div>
      </template>
    </div>
  </main>

  <footer class="footer" id="footer-stats">
    <template x-if="stats.total !== null">
      <div class="footer-stats">
        <div class="footer-stat"><div class="footer-stat-value" x-text="stats.total"></div><div class="footer-stat-label">总运行</div></div>
        <div class="footer-stat"><div class="footer-stat-value" x-text="stats.rate+'%'"></div><div class="footer-stat-label">成功率</div></div>
        <div class="footer-stat"><div class="footer-stat-value" x-text="stats.todayCount"></div><div class="footer-stat-label">今日运行</div></div>
      </div>
    </template>
    <template x-if="stats.total === null">
      <p>brun &mdash; bio-runner &copy; 2026</p>
    </template>
  </footer>

  <script src="/static/app.js"></script>
  <script src="/static/alpine.js" defer></script>
  <script>
    function dashboard() {
      return {
        loading: true,
        refreshing: false,
        filters: { project: '', status: '', tag: '', search: '' },
        projects: [],
        tags: [],
        runs: [],
        stats: { total: null, rate: 0, todayCount: 0 },
        _runningTimers: {},
        _autoRefreshTimer: null,

        async init() {
          await this.loadFilters();
          await this.loadRuns();
          this.loadFooterStats();
        },

        async loadFilters() {
          try {
            const [pj, tg] = await Promise.all([
              fetch('/api/projects').then(r => r.json()),
              fetch('/api/tags').then(r => r.json()),
            ]);
            this.projects = pj;
            this.tags = tg;
          } catch (e) { console.error('loadFilters:', e); }
        },

        async loadRuns() {
          try {
            const p = new URLSearchParams();
            if (this.filters.project) p.set('project', this.filters.project);
            if (this.filters.status) p.set('status', this.filters.status);
            if (this.filters.tag) p.set('tag', this.filters.tag);
            if (this.filters.search) p.set('search', this.filters.search);
            const resp = await fetch('/api/runs?' + p.toString());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            this.runs = await resp.json();
            this.manageRunningTimers();
          } catch (err) {
            console.error('loadRuns error:', err);
          } finally {
            this.loading = false;
          }
        },

        doRefresh() {
          this.refreshing = true;
          this.loadRuns().then(() => {
            setTimeout(() => { this.refreshing = false; }, 400);
          });
        },

        manageRunningTimers() {
          var seen = {};
          this.runs.forEach(function(r) {
            if (r.status === 'running' && r.started_at) seen[r.id] = r.started_at;
          });
          var self = this;
          Object.keys(seen).forEach(function(id) {
            if (!self._runningTimers[id]) self._runningTimers[id] = seen[id];
          });
          Object.keys(self._runningTimers).forEach(function(id) {
            if (!seen[id]) delete self._runningTimers[id];
          });
          var hasRunning = Object.keys(self._runningTimers).length > 0;
          if (hasRunning && !self._autoRefreshTimer) {
            self._autoRefreshTimer = setInterval(() => self.loadRuns(), 10000);
          } else if (!hasRunning && self._autoRefreshTimer) {
            clearInterval(self._autoRefreshTimer);
            self._autoRefreshTimer = null;
          }
        },

        getDuration(r) {
          var started = this._runningTimers[r.id];
          if (started && r.status === 'running') {
            var ms = Date.now() - new Date(started).getTime();
            return formatDuration(ms);
          }
          return r.duration || '-';
        },

        async loadFooterStats() {
          try {
            var runs = await fetch('/api/runs').then(r => r.json());
            if (!Array.isArray(runs)) return;
            var total = runs.length;
            var success = runs.filter(function(r) { return r.status === 'success'; }).length;
            var today = new Date().toISOString().slice(0, 10);
            this.stats = {
              total: total,
              rate: total > 0 ? Math.round(success / total * 100) : 0,
              todayCount: runs.filter(function(r) { return r.started_at && r.started_at.startsWith(today); }).length
            };
          } catch (e) { /* 静默 */ }
        },

        async deleteRun(id, e) {
          modalConfirm('确认删除', '将同时删除日志和输出文件，不可恢复。', async () => {
            var r = await fetch('/api/runs/' + id, { method: 'DELETE' });
            var d = await r.json();
            if (d.ok) { toast('success', '已删除'); this.loadRuns(); this.loadFooterStats(); }
            else toast('error', d.error || '删除失败');
          });
        }
      };
    }
  </script>
</body>
</html>
