<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Detail - brun</title>
  <link rel="stylesheet" href="/static/highlight-github-dark.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><a href="/">brun</a></div>
    <div class="nav-links"><a href="/">Dashboard</a></div>
  </nav>

  <main class="container detail-page" x-data="detailPage()" x-init="init()">
    <!-- 返回 + 操作栏 -->
    <div class="detail-header">
      <a href="/" class="btn btn-sm btn-outline">&larr; 返回列表</a>
      <span class="detail-actions">
        <button x-show="detail.status==='running'" @click="doKill()" class="btn btn-sm btn-danger">终止</button>
        <button x-show="detail.command" @click="doRerun()" class="btn btn-sm btn-primary">重跑</button>
        <button x-show="detail.status!=='running'" @click="doDelete()" class="btn btn-sm btn-outline">删除</button>
        <button @click="copyCmd()" class="btn btn-sm btn-outline">复制命令</button>
      </span>
    </div>

    <!-- 左右分栏主体 -->
    <div class="detail-body">
      <!-- 左侧：基本信息 -->
      <aside class="detail-sidebar">
        <div :class="'sidebar-card status-'+(detail.status||'unknown')">
          <!-- 加载中 -->
          <template x-if="!detail.id"><p class="text-muted">加载中...</p></template>

          <template x-if="detail.id">
            <div>
              <div class="side-info">
                <label>Run ID</label>
                <div class="side-value"><code x-text="detail.id"></code></div>
              </div>
              <template x-if="detail.name">
                <div class="side-info"><label>Name</label><div class="side-value" x-text="detail.name"></div></div>
              </template>

              <div class="side-group-title">执行状态</div>
              <div class="side-info">
                <label>Status</label>
                <div class="side-value"><span :class="'badge badge-'+(detail.status||'unknown')" x-text="detail.status"></span></div>
              </div>
              <div class="side-info">
                <label>Duration</label>
                <div class="side-value"><strong id="duration-value" style="font-size:18px" x-text="displayDuration"></strong></div>
              </div>
              <div class="side-info">
                <label>Exit Code</label>
                <div class="side-value"><code x-text="detail.exit_code ?? '-'"></code></div>
              </div>
              <div class="side-info">
                <label>Peak Memory</label>
                <div class="side-value" x-text="fmtMem(detail.peak_rss_kb)"></div>
              </div>
              <div class="side-info">
                <label>CPU Time</label>
                <div class="side-value" x-text="fmtCPU(detail.cpu_time_ms)"></div>
              </div>

              <div class="side-group-title">命令与环境</div>
              <div class="side-info">
                <label>Command</label>
                <div class="cmd-compact" id="cmd-text">
                  <span x-text="detail.command"></span>
                  <button class="cmd-copy-btn" @click="copyCmd()" title="复制命令">复制</button>
                </div>
              </div>
              <div class="side-info">
                <label>Project</label>
                <div class="side-value"><span x-text="detail.project || '-'"></span></div>
              </div>
              <div class="side-info">
                <label>CWD</label>
                <div class="side-value" :title="detail.cwd"
                     style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                     x-text="detail.cwd || '-'"></div>
              </div>

              <div class="side-group-title">时间信息</div>
              <div class="side-info">
                <label>Started</label>
                <div class="side-value">
                  <span x-text="fmtTime(detail.started_at)"></span>
                  <span class="text-muted" style="margin-left:6px;font-size:12px" x-text="timeAgo(detail.started_at)"></span>
                </div>
              </div>
              <div class="side-info">
                <label>Ended</label>
                <div class="side-value" x-text="fmtTime(detail.ended_at) || '-'"></div>
              </div>

              <template x-if="detail.git_commit">
                <div>
                  <div class="side-group-title">版本信息</div>
                  <div class="side-info">
                    <label>Git</label>
                    <div class="side-value"><code x-text="detail.git_commit.substring(0,8)+(detail.git_dirty?' (dirty)':'')"></code></div>
                  </div>
                </div>
              </template>
              <template x-if="detail.tags && detail.tags.length">
                <div class="side-info">
                  <label>Tags</label>
                  <div class="side-value">
                    <template x-for="t in detail.tags"><span class="tag" x-text="t"></span>&nbsp;</template>
                  </div>
                </div>
              </template>
              <template x-if="detail.note">
                <div class="side-info">
                  <label>Note</label>
                  <div class="side-value" x-text="detail.note"></div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </aside>

      <!-- 右侧：统一标签页 -->
      <div class="detail-main">
        <div class="log-viewer">
          <div class="log-tabs">
            <button class="log-tab" x-show="scriptContent" :class="{active:tab==='script'}"
                    @click="switchTab('script')" data-tab="script">Script</button>
            <button class="log-tab" :class="{active:tab==='stdout'}" @click="switchTab('stdout')">stdout</button>
            <button class="log-tab" :class="{active:tab==='stderr'}" @click="switchTab('stderr')">stderr</button>
            <div class="log-toolbar" x-show="tab!=='script'">
              <input type="number" id="log-tail" placeholder="tail 行数" class="input-sm" style="width:90px" value=""
                     @change="loadLog()">
              <input type="text" id="log-search" placeholder="搜索日志..." class="input-sm" style="width:180px"
                     @input.debounce.200ms="renderLog()">
              <label class="checkbox-inline">
                <input type="checkbox" id="auto-refresh" checked @change="onAutoRefreshChange($event)"> auto-refresh
              </label>
            </div>
            <div class="log-toolbar" x-show="tab==='script'">
              <span class="script-meta" x-text="scriptMeta"></span>
              <button class="btn btn-sm btn-outline" @click="copyScript()">复制脚本</button>
            </div>
          </div>

          <!-- Script 面板 -->
          <div x-show="tab==='script'" id="script-panel" class="script-viewer">
            <pre id="script-line-numbers" class="script-line-numbers" aria-hidden="true"></pre>
            <pre class="script-content"><code id="script-code"></code></pre>
          </div>

          <!-- 日志面板 -->
          <pre class="log-content" id="log-content" x-show="tab!=='script'"></pre>
        </div>

        <!-- 输出文件 -->
        <div class="section">
          <h3>输出文件</h3>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Type</th><th>Status</th><th>Size</th><th>Path</th></tr></thead>
              <tbody id="arts-tbody">
                <template x-if="artifacts.length === 0">
                  <tr><td colspan="4" class="text-muted" style="padding:20px">无输出文件</td></tr>
                </template>
                <template x-for="a in artifacts" :key="a.path">
                  <tr>
                    <td x-text="a.kind"></td>
                    <td><span :class="'badge badge-'+a.status" x-text="a.status"></span></td>
                    <td x-text="a.size"></td>
                    <td x-text="a.path"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="/static/app.js"></script>
  <script src="/static/highlight.min.js"></script>
  <script src="/static/alpine.js" defer></script>
  <script>
    function detailPage() {
      var RUN_ID = window.location.pathname.split('/').pop();
      return {
        detail: {},
        tab: 'stdout',
        currentStream: 'stdout',
        scriptContent: '',
        scriptName: '',
        artifacts: [],
        // --- 日志状态 ---
        logOffset: 0,
        logSource: null,
        _logContent: '',
        _renderedLines: 0,
        _isFirstLogLoad: true,
        _escapedCache: '',
        durationTimer: null,
        displayDuration: '-',

        async init() {
          await this.loadDetail();
          document.getElementById('log-search').addEventListener('input', debounce(this.renderLog.bind(this), 200));
          document.getElementById('log-tail').addEventListener('change', this.loadLog.bind(this));
        },

        switchTab(t) {
          this.tab = t;
          if (t === 'script') {
            this.disconnectSSE();
            this.renderScript();
          } else {
            this.currentStream = t;
            this.disconnectSSE();
            this.loadLog();
            if (this.detail.status === 'running') this.connectSSE();
          }
        },

        onAutoRefreshChange(e) {
          if (e.target.checked && this.detail.status === 'running') {
            this.connectSSE();
          } else {
            this.disconnectSSE();
          }
        },

        get scriptDisplayContent() {
          if (!this.scriptContent) return '';
          var isBinary = this.scriptContent.indexOf('\x00') >= 0 || this.scriptContent.indexOf('ELF') === 0;
          if (isBinary) return '（脚本快照为二进制文件，' + this.scriptContent.length.toLocaleString() + ' 字节，无法显示）';
          if (this.scriptContent.length > 512000) {
            return this.scriptContent.substring(0, 512000) +
              '\n\n--- 文件过大（' + (this.scriptContent.length / 1024).toFixed(0) + 'KB），已截断显示 ---';
          }
          return this.scriptContent;
        },

        get scriptLang() {
          return scriptLangFromName(this.scriptName);
        },

        get scriptMeta() {
          var parts = [];
          if (this.scriptName) parts.push(this.scriptName);
          parts.push(this.scriptLang);
          return parts.join(' · ');
        },

        renderScript() {
          var self = this;
          setTimeout(function() {
            var el = document.getElementById('script-code');
            var lines = document.getElementById('script-line-numbers');
            if (!el) return;
            var content = self.scriptDisplayContent;
            el.textContent = content;
            if (lines) {
              var count = content ? content.split('\n').length : 1;
              var nums = [];
              for (var i = 1; i <= count; i++) nums.push(i);
              lines.textContent = nums.join('\n');
            }
            el.className = 'language-' + self.scriptLang;
            if (window.hljs) {
              el.removeAttribute('data-highlighted');
              window.hljs.highlightElement(el);
            }
          }, 0);
        },

        async loadDetail() {
          try {
            var r = await fetch('/api/runs/' + RUN_ID);
            if (r.status === 404) { this.detail = { status: 'notfound' }; return; }
            var d = await r.json();
            document.title = (d.name || d.id) + ' - brun';
            this.detail = d;
            this.scriptContent = d.script || '';
            this.scriptName = d.script_name || '';
            this.displayDuration = d.duration || formatDuration(d.duration_ms) || '-';
            this.renderScript();
            await this.loadArtifacts();
            this.loadLog();
            this.stopDurationTimer();
            if (d.status === 'running' && d.started_at) this.startDurationTimer(d.started_at);
            if (d.status === 'running') this.connectSSE();
          } catch (e) { console.error('loadDetail error:', e); }
        },

        async loadArtifacts() {
          try {
            this.artifacts = await fetch('/api/runs/' + RUN_ID + '/artifacts').then(function(r) { return r.json(); });
          } catch (e) { this.artifacts = []; }
        },

        async loadLog() {
          this.disconnectSSE();
          var tail = document.getElementById('log-tail').value;
          var p = new URLSearchParams({ stream: this.currentStream });
          if (tail) p.set('tail', tail);
          var d = await fetch('/api/runs/' + RUN_ID + '/logs?' + p.toString()).then(function(r) { return r.json(); });
          this._logContent = d.content || '';
          this.logOffset = d.size || 0;
          this._isFirstLogLoad = true;
          this._renderedLines = 0;
          this.renderLog();
        },

        renderLog() {
          var el = document.getElementById('log-content');
          var q = document.getElementById('log-search').value;

          if (q) {
            var content = esc(this._logContent);
            var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            content = content.replace(re, function(m) { return '<mark>' + m + '</mark>'; });
            el.className = 'log-content';
            el.innerHTML = content || '<span class="text-muted">(空)</span>';
            this._renderedLines = content.split('\n').length;
            this.autoScroll(el);
            return;
          }

          if (!this._logContent) { el.innerHTML = '<span class="text-muted">(空)</span>'; return; }

          var lines = this._logContent.split('\n');
          var previousRenderedLines = this._renderedLines;
          var needsFullRender = this._escapedCache === '' || this._isFirstLogLoad || this._renderedLines === 0 || lines.length < this._renderedLines;
          if (needsFullRender) {
            this._escapedCache = esc(this._logContent);
            this._renderedLines = lines.length;
          } else if (this._renderedLines < lines.length) {
            var newLines = lines.slice(this._renderedLines);
            var escapedNew = newLines.map(function(line) { return esc(line); });
            this._escapedCache += escapedNew.join('\n') + (newLines.length > 0 ? '\n' : '');
            this._renderedLines = lines.length;
          }

          if (needsFullRender || el.innerHTML === '') {
            this._isFirstLogLoad = false;
            if (lines.length < 200) {
              el.className = 'log-content typewriter';
              var cachedLines = this._escapedCache.split('\n');
              el.innerHTML = cachedLines.map(function(line, i) {
                return '<div class="log-line" style="animation-delay:' + Math.min(i * 15, 1500) + 'ms">' + (line || '&nbsp;') + '</div>';
              }).join('');
            } else {
              el.className = 'log-content';
              el.innerHTML = this._escapedCache;
            }
          } else {
            var newLines = lines.slice(previousRenderedLines, this._renderedLines);
            if (newLines.length > 0) {
              var frag = document.createDocumentFragment();
              newLines.forEach(function(line) {
                var div = document.createElement('div');
                div.className = 'log-line';
                div.textContent = line || ' ';
                frag.appendChild(div);
              });
              el.appendChild(frag);
            }
          }
          this.autoScroll(el);
        },

        autoScroll(el) {
          if (el.scrollHeight - el.scrollTop - el.clientHeight < 80) {
            el.scrollTop = el.scrollHeight;
          }
        },

        startDurationTimer(startedAt) {
          this.stopDurationTimer();
          var self = this;
          var start = new Date(startedAt).getTime();
          var el = document.getElementById('duration-value');
          this.durationTimer = setInterval(function () {
            self.displayDuration = formatDuration(Date.now() - start);
          }, 1000);
          this.displayDuration = formatDuration(Date.now() - start);
        },

        stopDurationTimer() {
          if (this.durationTimer) { clearInterval(this.durationTimer); this.durationTimer = null; }
        },

        updateRunStatus(d) {
          if (!d.status) return;
          this.detail = Object.assign({}, this.detail, { status: d.status });
          if (d.duration) this.displayDuration = d.duration;
          if (d.exit_code !== undefined) {
            this.detail = Object.assign({}, this.detail, { exit_code: d.exit_code });
          }
          if (d.ended_at) {
            this.detail = Object.assign({}, this.detail, { ended_at: d.ended_at });
          }
          this.stopDurationTimer();
        },

        connectSSE() {
          this.disconnectSSE();
          var url = '/api/runs/' + RUN_ID + '/logs/stream?stream=' + this.currentStream;
          var self = this;
          this.logSource = new EventSource(url);

          this.logSource.onmessage = function(evt) {
            var d = JSON.parse(evt.data);
            if (d.done) {
              self.disconnectSSE();
              self.updateRunStatus(d);
              return;
            }
            if (d.content) self._logContent += d.content;
            if (d.size) self.logOffset = d.size;
            self.renderLog();
          };

          this.logSource.onerror = function() {
            if (self.logSource && self.logSource.readyState !== EventSource.CONNECTING) {
              self.disconnectSSE();
            }
          };
        },

        disconnectSSE() {
          if (this.logSource) { this.logSource.close(); this.logSource = null; }
        },

        copyCmd() {
          var cmd = this.detail.command || '';
          navigator.clipboard.writeText(cmd).then(() => {
            toast('success', '命令已复制到剪贴板');
          }).catch(() => toast('error', '复制失败'));
        },

        copyScript() {
          if (!this.scriptContent) return;
          navigator.clipboard.writeText(this.scriptContent).then(() => {
            toast('success', '脚本已复制到剪贴板');
          }).catch(() => toast('error', '复制失败'));
        },

        doRerun() {
          var self = this;
          modalConfirm('确认重跑', '将创建一个全新的任务记录并执行', async function() {
            var r = await fetch('/api/runs/' + RUN_ID + '/rerun', { method: 'POST' });
            var d = await r.json();
            if (d.ok && d.run_id) {
              toast('success', '已创建新任务，正在跳转...');
              setTimeout(function() { location.href = '/run/' + d.run_id; }, 600);
            } else {
              toast('error', d.error || '失败');
            }
          });
        },

        doKill() {
          modalConfirm('确认终止', '确定要终止这个运行中的任务？', async () => {
            var r = await fetch('/api/runs/' + RUN_ID + '/kill', { method: 'POST' });
            var d = await r.json();
            if (d.ok) { toast('success', '已终止 PID: ' + d.killed); setTimeout(function() { location.reload(); }, 1000); }
            else toast('error', d.error || '终止失败');
          });
        },

        doDelete() {
          modalConfirm('确认删除', '将同时删除日志和输出文件，不可恢复。', async () => {
            var r = await fetch('/api/runs/' + RUN_ID, { method: 'DELETE' });
            var d = await r.json();
            if (d.ok) { toast('success', '已删除'); setTimeout(function() { location.href = '/'; }, 600); }
            else toast('error', d.error || '删除失败');
          });
        }
      };
    }

    function debounce(fn, ms) {
      var t = null;
      return function() { var a = arguments; clearTimeout(t); t = setTimeout(function() { fn.apply(this, a); }, ms); };
    }
    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function fmtTime(s) { if (!s) return '-'; try { return new Date(s).toLocaleString('zh-CN'); } catch(e) { return s; } }
    function fmtMem(kb) { if (!kb) return '-'; if (kb < 1024) return kb + ' KB'; return (kb / 1024).toFixed(1) + ' MB'; }
    function fmtCPU(ms) { if (!ms) return '-'; if (ms < 1000) return ms + 'ms'; return (ms / 1000).toFixed(2) + 's'; }
    function scriptLangFromName(name) {
      var n = (name || '').toLowerCase();
      if (n.endsWith('.sh') || n.endsWith('.bash') || n.endsWith('.zsh')) return 'bash';
      if (n.endsWith('.py') || n.endsWith('.smk')) return 'python';
      if (n.endsWith('.r')) return 'r';
      if (n.endsWith('.rmd') || n.endsWith('.md')) return 'markdown';
      if (n.endsWith('.js')) return 'javascript';
      if (n.endsWith('.ts')) return 'typescript';
      if (n.endsWith('.json')) return 'json';
      if (n.endsWith('.yaml') || n.endsWith('.yml')) return 'yaml';
      if (n.endsWith('.toml')) return 'ini';
      if (n.endsWith('.cfg') || n.endsWith('.conf')) return 'ini';
      if (n.endsWith('.pl')) return 'perl';
      if (n.endsWith('.rb')) return 'ruby';
      return 'plaintext';
    }
    function formatDuration(ms) {
      if (ms < 1000) return ms + 'ms';
      var s = Math.floor(ms / 1000);
      if (s < 60) return s + 's';
      var m = Math.floor(s / 60); var sec = s % 60;
      if (m < 60) return m + 'm ' + sec + 's';
      var h = Math.floor(m / 60); var min = m % 60;
      return h + 'h ' + min + 'm';
    }
  </script>
</body>
</html>
