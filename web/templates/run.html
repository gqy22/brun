<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Detail - brun</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/">brun</a>
    </div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
    </div>
  </nav>

  <main class="container detail-page">
    <!-- 返回 + 操作栏 -->
    <div class="detail-header">
      <a href="/" class="btn btn-sm btn-outline">&larr; 返回列表</a>
      <span class="detail-actions">
        <button id="btn-kill" class="btn btn-sm btn-danger" style="display:none" onclick="doKill()">终止</button>
        <button id="btn-rerun" class="btn btn-sm btn-primary" style="display:none" onclick="doRerun()">重跑</button>
        <button id="btn-delete" class="btn btn-sm btn-outline" style="display:none" onclick="doDelete()">删除</button>
        <button id="btn-copy-cmd" class="btn btn-sm btn-outline" onclick="copyCmd()">复制命令</button>
      </span>
    </div>

    <!-- 左右分栏主体 -->
    <div class="detail-body">
      <!-- 左侧：基本信息 -->
      <aside class="detail-sidebar">
        <div class="sidebar-card" id="info-panel">
          <p class="text-muted">加载中...</p>
        </div>
      </aside>

      <!-- 右侧：统一标签页（Script / stdout / stderr）+ 输出文件 -->
      <div class="detail-main">
        <!-- 统一标签栏 -->
        <div class="log-viewer">
          <div class="log-tabs" id="main-tabs">
            <button class="log-tab" data-tab="script" onclick="switchMainTab('script')">Script</button>
            <button class="log-tab active" data-tab="stdout" onclick="switchMainTab('stdout')">stdout</button>
            <button class="log-tab" data-tab="stderr" onclick="switchMainTab('stderr')">stderr</button>
            <div class="log-toolbar" id="log-toolbar">
              <input type="number" id="log-tail" placeholder="tail 行数" class="input-sm" style="width:90px" value="">
              <input type="text" id="log-search" placeholder="搜索日志..." class="input-sm" style="width:180px">
              <label class="checkbox-inline">
                <input type="checkbox" id="auto-refresh" checked> auto-refresh
              </label>
            </div>
            <div class="log-toolbar" id="script-toolbar" style="display:none">
              <button class="btn btn-sm btn-outline" onclick="copyScript()">复制脚本</button>
            </div>
          </div>

          <!-- Script 面板（默认隐藏） -->
          <pre class="log-content" id="script-panel" style="display:none;font-size:12px;line-height:1.5;background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:4px;white-space:pre-wrap;word-break:break-all"></pre>

          <!-- 日志面板 -->
          <pre class="log-content" id="log-content"></pre>
        </div>

        <!-- 输出文件 -->
        <div class="section">
          <h3>输出文件</h3>
          <div class="table-wrap">
            <table class="table" id="arts-table">
              <thead><tr><th>Type</th><th>Status</th><th>Size</th><th>Path</th></tr></thead>
              <tbody id="arts-tbody"><tr><td colspan="4" class="text-muted">-</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    const RUN_ID = window.location.pathname.split('/').pop();
    let currentStream = 'stdout';
    let currentMainTab = 'stdout'; // 'script' | 'stdout' | 'stderr'
    let logOffset = 0;
    let logSource = null;
    let _logContent = '';
    let _renderedLines = 0;
    let _isFirstLogLoad = true;
    let _escapedCache = '';
    let durationTimer = null;
    let _scriptContent = '';

    document.addEventListener('DOMContentLoaded', () => {
      loadDetail();
      document.getElementById('log-search').addEventListener('input', debounce(renderLog, 200));
      document.getElementById('log-tail').addEventListener('change', () => loadLog());
    });

    // ===== 统一标签页切换 =====

    function switchMainTab(tab) {
      currentMainTab = tab;

      // 更新标签激活状态
      document.querySelectorAll('#main-tabs .log-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.tab === tab);
      });

      var scriptPanel = document.getElementById('script-panel');
      var logPanel = document.getElementById('log-content');
      var scriptToolbar = document.getElementById('script-toolbar');
      var logToolbar = document.getElementById('log-toolbar');

      if (tab === 'script') {
        scriptPanel.style.display = '';
        logPanel.style.display = 'none';
        scriptToolbar.style.display = '';
        logToolbar.style.display = 'none';
        disconnectSSE();
      } else {
        scriptPanel.style.display = 'none';
        logPanel.style.display = '';
        scriptToolbar.style.display = 'none';
        logToolbar.style.display = '';
        currentStream = tab;
        disconnectSSE();
        loadLog();
        if (document.querySelector('.badge-running')) connectSSE();
      }
    }

    async function loadDetail() {
      const r = await fetch('/api/runs/' + RUN_ID);
      if (r.status === 404) { document.getElementById('info-panel').innerHTML = '<p class="text-danger">Run not found</p>'; return; }
      const d = await r.json();

      document.title = `${d.name || d.id} - brun`;

      // 保存脚本内容
      _scriptContent = d.script || '';

      const panel = document.getElementById('info-panel');
      panel.className = `sidebar-card status-${d.status}`;
      panel.innerHTML = `
        <div class="side-info">
          <label>Run ID</label>
          <div class="side-value"><code>${esc(d.id)}</code></div>
        </div>
        ${d.name ? `<div class="side-info"><label>Name</label><div class="side-value">${esc(d.name)}</div></div>` : ''}

        <div class="side-group-title">执行状态</div>
        <div class="side-info">
          <label>Status</label>
          <div class="side-value"><span class="badge badge-${d.status}">${d.status}</span></div>
        </div>
        <div class="side-info">
          <label>Duration</label>
          <div class="side-value"><strong id="duration-value" style="font-size:18px">${d.duration || '-'}</strong></div>
        </div>
        <div class="side-info">
          <label>Exit Code</label>
          <div class="side-value"><code>${d.exit_code ?? '-'}</code></div>
        </div>
        <div class="side-info">
          <label>Peak Memory</label>
          <div class="side-value">${fmtMem(d.peak_rss_kb)}</div>
        </div>
        <div class="side-info">
          <label>CPU Time</label>
          <div class="side-value">${fmtCPU(d.cpu_time_ms)}</div>
        </div>

        <div class="side-group-title">命令与环境</div>
        <div class="side-info">
          <label>Command</label>
          <div class="cmd-compact" id="cmd-text">${esc(d.command)}<button class="cmd-copy-btn" onclick="copyCmd()" title="复制命令">复制</button></div>
        </div>
        <div class="side-info">
          <label>Project</label>
          <div class="side-value">${esc(d.project) || '<span class=text-muted>-</span>'}</div>
        </div>
        <div class="side-info">
          <label>CWD</label>
          <div class="side-value" title="${esc(d.cwd)}" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.cwd)}</div>
        </div>

        <div class="side-group-title">时间信息</div>
        <div class="side-info">
          <label>Started</label>
          <div class="side-value">${fmtTime(d.started_at)}<span class="text-muted" style="margin-left:6px;font-size:12px">${timeAgo(d.started_at)}</span></div>
        </div>
        <div class="side-info">
          <label>Ended</label>
          <div class="side-value">${fmtTime(d.ended_at) || '<span class=text-muted>-</span>'}</div>
        </div>

        ${d.git_commit ? `
        <div class="side-group-title">版本信息</div>
        <div class="side-info">
          <label>Git</label>
          <div class="side-value"><code>${esc(d.git_commit.substring(0,8))}${d.git_dirty ? ' (dirty)' : ''}</code></div>
        </div>` : ''}
        ${d.tags?.length ? `
        <div class="side-info">
          <label>Tags</label>
          <div class="side-value">${d.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join(' ')}</div>
        </div>` : ''}
        ${d.note ? `
        <div class="side-info">
          <label>Note</label>
          <div class="side-value">${esc(d.note)}</div>
        </div>` : ''}
      `;

      // 渲染 Script 面板内容
      renderScriptPanel();

      // 有脚本时显示 Script 标签，否则隐藏
      var scriptTab = document.querySelector('#main-tabs [data-tab="script"]');
      if (scriptTab) {
        scriptTab.style.display = _scriptContent ? '' : 'none';
        if (!_scriptContent && currentMainTab === 'script') {
          switchMainTab('stdout');
        }
      }

      if (d.command) document.getElementById('btn-rerun').style.display = '';
      if (d.status === 'running') document.getElementById('btn-kill').style.display = '';
      if (d.status !== 'running') document.getElementById('btn-delete').style.display = '';

      loadArtifacts();
      loadLog();
      stopDurationTimer();
      if (d.status === 'running' && d.started_at) startDurationTimer(d.started_at);
      if (d.status === 'running') connectSSE();
    }

    function renderScriptPanel() {
      var el = document.getElementById('script-panel');
      if (!el) return;
      if (!_scriptContent) {
        el.textContent = '(无脚本快照)';
        el.style.display = 'none';
        return;
      }
      // 检测二进制内容（含 NULL 字节或 ELF 魔数）
      var isBinary = _scriptContent.indexOf('\x00') >= 0 || _scriptContent.indexOf('ELF') === 0;
      if (isBinary) {
        el.innerHTML = '<span class="text-muted">（脚本快照为二进制文件，' + _scriptContent.length.toLocaleString() + ' 字节，无法显示）</span>';
        el.style.display = currentMainTab === 'script' ? '' : 'none';
        return;
      }
      // 超过 500KB 时截断提示
      if (_scriptContent.length > 512000) {
        el.textContent = _scriptContent.substring(0, 512000) + '\n\n--- 文件过大（' + (_scriptContent.length / 1024).toFixed(0) + 'KB），已截断显示 ---';
      } else {
        el.textContent = _scriptContent;
      }
      el.style.display = currentMainTab === 'script' ? '' : 'none';
    }

    async function loadArtifacts() {
      const arts = await fetch('/api/runs/' + RUN_ID + '/artifacts').then(r => r.json());
      const tb = document.getElementById('arts-tbody');
      if (!arts.length) { tb.innerHTML = '<tr><td colspan="4" class="text-muted" style="padding:20px">无输出文件</td></tr>'; return; }
      tb.innerHTML = arts.map(a => `<tr><td>${esc(a.kind)}</td><td><span class="badge badge-${a.status}">${a.status}</span></td><td>${a.size}</td><td>${esc(a.path)}</td></tr>`).join('');
    }

    async function loadLog() {
      disconnectSSE();
      const tail = document.getElementById('log-tail').value;
      const params = new URLSearchParams({ stream: currentStream });
      if (tail) params.set('tail', tail);
      const d = await fetch('/api/runs/' + RUN_ID + '/logs?' + params.toString()).then(r => r.json());
      _logContent = d.content || '';
      logOffset = d.size || 0;
      _isFirstLogLoad = true;
      _renderedLines = 0;
      renderLog();
    }

    function renderLog() {
      var el = document.getElementById('log-content');
      var q = document.getElementById('log-search').value;

      if (q) {
        var content = esc(_logContent);
        var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        content = content.replace(re, m => '<mark>' + m + '</mark>');
        el.className = 'log-content';
        el.innerHTML = content || '<span class="text-muted">(空)</span>';
        _renderedLines = content.split('\n').length;
        autoScroll(el);
        return;
      }

      if (!_logContent) { el.innerHTML = '<span class="text-muted">(空)</span>'; return; }

      var lines = _logContent.split('\n');
      if (_escapedCache === '' || _isFirstLogLoad || _renderedLines === 0 || lines.length < _renderedLines) {
        _isFirstLogLoad = false;
        _escapedCache = esc(_logContent);
        _renderedLines = 0;
      }
      if (_renderedLines < lines.length) {
        var newLines = lines.slice(_renderedLines);
        var escapedNew = newLines.map(function(line) { return esc(line); });
        _escapedCache += escapedNew.join('\n') + (newLines.length > 0 ? '\n' : '');
        _renderedLines = lines.length;
      }

      if (_isFirstLogLoad || el.innerHTML === '') {
        _isFirstLogLoad = false;
        if (lines.length < 200) {
          el.className = 'log-content typewriter';
          var cachedLines = _escapedCache.split('\n');
          el.innerHTML = cachedLines.map(function(line, i) {
            return '<div class="log-line" style="animation-delay:' + Math.min(i * 15, 1500) + 'ms">' + (line || '&nbsp;') + '</div>';
          }).join('');
        } else {
          el.className = 'log-content';
          el.innerHTML = _escapedCache;
        }
      } else {
        var newLines = lines.slice(_renderedLines - newLines.length, _renderedLines);
        if (newLines.length > 0) {
          var frag = document.createDocumentFragment();
          newLines.forEach(function(line) {
            var div = document.createElement('div');
            div.className = 'log-line';
            div.textContent = line || ' ';
            frag.appendChild(div);
          });
          el.appendChild(frag);
        }
      }

      autoScroll(el);
    }

    function autoScroll(el) {
      if (el.scrollHeight - el.scrollTop - el.clientHeight < 80) {
        el.scrollTop = el.scrollHeight;
      }
    }

    // ===== Duration 实时计时器 =====

    function startDurationTimer(startedAt) {
      stopDurationTimer();
      var start = new Date(startedAt).getTime();
      var el = document.getElementById('duration-value');
      durationTimer = setInterval(function () {
        var ms = Date.now() - start;
        el.textContent = formatDuration(ms);
      }, 1000);
      var ms = Date.now() - start;
      el.textContent = formatDuration(ms);
    }

    function stopDurationTimer() {
      if (durationTimer) { clearInterval(durationTimer); durationTimer = null; }
    }

    function formatDuration(ms) {
      if (ms < 1000) return ms + 'ms';
      var s = Math.floor(ms / 1000);
      if (s < 60) return s + 's';
      var m = Math.floor(s / 60);
      var sec = s % 60;
      if (m < 60) return m + 'm ' + sec + 's';
      var h = Math.floor(m / 60);
      var min = m % 60;
      return h + 'h ' + min + 'm';
    }

    // ===== 轻量级状态更新（SSE done 时调用） =====

    function updateRunStatus(d) {
      var panel = document.getElementById('info-panel');
      if (!panel) return;

      panel.className = 'sidebar-card status-' + (d.status || 'unknown');

      var badge = panel.querySelector('.badge');
      if (badge) { badge.className = 'badge badge-' + (d.status || 'unknown'); badge.textContent = d.status || ''; }

      var durEl = document.getElementById('duration-value');
      if (durEl && d.duration) durEl.textContent = d.duration;

      var exitEl = panel.querySelectorAll('.side-value');
      if (exitEl.length > 3 && d.exit_code !== undefined) exitEl[2].textContent = d.exit_code;

      document.getElementById('btn-kill').style.display = (d.status === 'running') ? '' : 'none';
      document.getElementById('btn-delete').style.display = (d.status === 'running') ? 'none' : '';
      document.getElementById('btn-rerun').style.display = d.command ? '' : 'none';

      var timeCells = panel.querySelectorAll('.side-value');
      for (var i = 0; i < timeCells.length; i++) {
        if (timeCells[i].textContent === '-' && d.ended_at) {
          timeCells[i].innerHTML = fmtTime(d.ended_at);
          break;
        }
      }
    }

    // ===== SSE 实时流 =====

    function connectSSE() {
      disconnectSSE();
      var url = '/api/runs/' + RUN_ID + '/logs/stream?stream=' + currentStream;
      logSource = new EventSource(url);

      logSource.onmessage = function(evt) {
        var d = JSON.parse(evt.data);
        if (d.done) {
          disconnectSSE();
          stopDurationTimer();
          updateRunStatus(d);
          return;
        }
        if (d.content) _logContent += d.content;
        if (d.size) logOffset = d.size;
        renderLog();
      };

      logSource.onerror = function() {
        if (logSource && logSource.readyState !== EventSource.CONNECTING) {
          disconnectSSE();
        }
      };
    }

    function disconnectSSE() {
      if (logSource) {
        logSource.close();
        logSource = null;
      }
    }

    document.getElementById('auto-refresh')?.addEventListener('change', function() {
      if (this.checked && document.querySelector('.badge-running')) {
        connectSSE();
      } else {
        disconnectSSE();
      }
    });

    async function doRerun() {
      modalConfirm('确认重跑', '将创建一个全新的任务记录并执行', async () => {
        const r = await fetch('/api/runs/' + RUN_ID + '/rerun', { method: 'POST' });
        const d = await r.json();
        if (d.ok && d.run_id) {
          toast('success', '已创建新任务，正在跳转...');
          setTimeout(() => location.href = '/run/' + d.run_id, 600);
        } else {
          toast('error', d.error || '失败');
        }
      });
    }

    async function doKill() {
      modalConfirm('确认终止', '确定要终止这个运行中的任务？', async () => {
        const r = await fetch('/api/runs/' + RUN_ID + '/kill', { method: 'POST' });
        const d = await r.json();
        if (d.ok) { toast('success', `已终止 PID: ${d.killed}`); setTimeout(() => location.reload(), 1000); }
        else toast('error', d.error || '终止失败');
      });
    }

    function copyCmd() {
      var cmd = '';
      var el = document.getElementById('cmd-text');
      if (el) cmd = el.childNodes[0].textContent || '';
      navigator.clipboard.writeText(cmd).then(() => {
        toast('success', '命令已复制到剪贴板');
        var btn = el ? el.querySelector('.cmd-copy-btn') : null;
        if (btn) { var orig = btn.textContent; btn.textContent = '已复制!'; setTimeout(() => btn.textContent = orig, 1200); }
      }).catch(() => toast('error', '复制失败'));
    }

    function copyScript() {
      if (!_scriptContent) return;
      navigator.clipboard.writeText(_scriptContent).then(() => {
        toast('success', '脚本已复制到剪贴板');
      }).catch(() => toast('error', '复制失败'));
    }

    async function doDelete() {
      modalConfirm('确认删除', '将同时删除日志和输出文件，不可恢复。', async () => {
        const r = await fetch('/api/runs/' + RUN_ID, { method: 'DELETE' });
        const d = await r.json();
        if (d.ok) { toast('success', '已删除'); setTimeout(() => location.href = '/', 600); }
        else toast('error', d.error || '删除失败');
      });
    }

    function debounce(fn, ms) { var t; return function() { var a = arguments; clearTimeout(t); t = setTimeout(function() { fn.apply(this, a); }, ms); }; }
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function fmtTime(s) { if (!s) return '-'; try { return new Date(s).toLocaleString('zh-CN'); } catch(e) { return s; } }
    function fmtMem(kb) { if (!kb) return '-'; if (kb < 1024) return kb + ' KB'; return (kb / 1024).toFixed(1) + ' MB'; }
    function fmtCPU(ms) { if (!ms) return '-'; if (ms < 1000) return ms + 'ms'; return (ms / 1000).toFixed(2) + 's'; }
  </script>
</body>
</html>
