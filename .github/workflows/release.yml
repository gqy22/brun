name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    outputs:
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Capture release metadata
        id: meta
        shell: bash
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(find . -name '*.go' -not -path './vendor/*' -print0 | xargs -0 gofmt -l)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -count=1

  build:
    name: Package (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true
          version: latest

      - name: Build release archive
        shell: bash
        env:
          BINARY_NAME: brun
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          ARCHIVE_FORMAT: ${{ matrix.archive }}
          VERSION: ${{ env.RELEASE_VERSION }}
          GO_VERSION_LDFLAGS: >-
            -s -w
            -X main.version=${{ env.RELEASE_VERSION }}
            -X main.commit=${{ github.sha }}
            -X main.buildDate=${{ needs.verify.outputs.build_date }}
        run: |
          mkdir -p dist package

          artifact_base="${BINARY_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          package_dir="package/${artifact_base}"
          mkdir -p "${package_dir}"

          go build -trimpath -ldflags "${GO_VERSION_LDFLAGS}" -o "${package_dir}/${BINARY_NAME}" .
          cp README.md "${package_dir}/README.md" 2>/dev/null || true
          cp LICENSE "${package_dir}/LICENSE" 2>/dev/null || true

          # Linux: UPX 压缩
          if [[ "${GOOS}" == "linux" ]]; then
            upx --best --lzma "${package_dir}/${BINARY_NAME}"
            echo "压缩后大小: $(du -h ${package_dir}/${BINARY_NAME} | cut -f1)"
          fi

          if [[ "${ARCHIVE_FORMAT}" == "zip" ]]; then
            (
              cd package
              zip -r "../dist/${artifact_base}.zip" "${artifact_base}"
            )
          else
            tar -C package -czf "dist/${artifact_base}.tar.gz" "${artifact_base}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify
      - build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Build release notes from changelog
        shell: bash
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          version="${VERSION#v}"
          notes_file="release-notes.md"
          binary_name="brun"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > "${notes_file}"

          if [[ ! -s "${notes_file}" ]]; then
            echo "No changelog entry found for version ${version}" >&2
            exit 1
          fi

          {
            echo "### 下载"
            echo
            echo "| 平台 | 文件 |"
            echo "|------|------|"
            echo "| Linux (x86_64, UPX) | \`${binary_name}_${version}_linux_amd64.tar.gz\` |"
            echo "| Linux (arm64, UPX) | \`${binary_name}_${version}_linux_arm64.tar.gz\` |"
            echo "| macOS (Apple Silicon) | \`${binary_name}_${version}_darwin_arm64.tar.gz\` |"
            echo "| macOS (Intel) | \`${binary_name}_${version}_darwin_amd64.tar.gz\` |"
            echo "| 校验和 | \`checksums.txt\` |"
            echo
            echo "### 更新内容"
            echo
            cat "${notes_file}"
            echo
            echo "---"
            echo
            echo "[完整更新日志](https://github.com/${{ github.repository }}/blob/${VERSION}/CHANGELOG.md)"
          } > "${notes_file}.tmp"

          mv "${notes_file}.tmp" "${notes_file}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_VERSION }} · brun
          tag_name: ${{ env.RELEASE_VERSION }}
          body_path: release-notes.md
          files: dist/*
          make_latest: true
